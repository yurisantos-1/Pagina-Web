<!DOCTYPE html>

<html lang="pt-br">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Blog</title>

</head>

<body>
    <header>
        <h1>Meu blog tech</h1>
        <p>Vou compartilhar conhecimentos sobre tecnologia e programação</p>
        <style>
            header {
                background-color: #183C63;
                color: #FFFFFF;
                text-align: center;
                max-width: 800px;
                margin: 0 auto;
                padding: 16px;
            }

            main {
                background-color: #FFFFFF;
                color: #183C63;
                display: flex;
            }

            img {
                width: 80px;
                height: 80px;
            }

            .artigo-autor {
                font-weight: bold;
            }
        </style>
    </header>

    <main>
        <img src="imagem-blog.png"
            alt="logotipo conceitual de tecnologia e educação: um livro aberto de onde emerge um cérebro digital brilhante, cercado por ícones de Wi-Fi, circuitos e lâmpada de ideia. Cores em tons de azul e branco.">
        <div>
            <h2>Meu primeiro post</h2>
            <p class="artigo-autor">Por: Turma do 1ºB</p>
            <p>Boas-vindas ao meu novo blog! Aqui vou compartilhar dicas de programação e curiosidades da área de
                tecnologia.</p>
<button>👍 <span>0</span>​</button>
        </div>
    </main>
</body>
<script>
    cost botao = document.querySelector("button");
    botao.addEventListener("click", botaoClicado);

    function botaoClicado(){
        console.log("fui clicado");
        let texto = botao.querySelector("span");
        texto.textContent++;
    }
</script>
</html>
